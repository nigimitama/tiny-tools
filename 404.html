<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>404</title>
    <!--
      Github Pages + React Routerでroot以外のURLに直接アクセスすると404に飛ぶため、
      せめてリポジトリのrootにリダイレクトする
      参考：https://github.com/rafgraph/spa-github-pages?tab=readme-ov-file
    -->
    <script type="text/javascript">
      const l = window.location
      const newURL = l.origin
      l.replace(newURL) // redirect
    </script>
  </head>
  <body>
  </body>
</html>
