<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>404</title>
    <!--
      Github Pages + React Routerでroot以外のURLに直接アクセスすると404に飛ぶため、
      本来のルートに戻すプログラム
      参考：https://github.com/rafgraph/spa-github-pages?tab=readme-ov-file
    -->
    <script type="text/javascript">
      const numOfPathPartsToKeep = 0
      const l = window.location
      const pathPart = l.pathname.split('/').slice(0, 1 + numOfPathPartsToKeep).join('/')
      const trueURL = `${l.hostname}/${pathPart}`
      l.replace(trueURL)
    </script>
  </head>
  <body>
  </body>
</html>
